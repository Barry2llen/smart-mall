server:
  port: 8989
spring:
  application:
    name: flash-sale
  config:
    import:
      - nacos:commons-redis?group=commons
      - nacos:commons?group=commons
      - nacos:rabbit?group=mq
      - nacos:sentinel?group=commons
  cloud:
    nacos:
      config:
        namespace: dev
        file-extension: yaml
      server-addr: 127.0.0.1:8848

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: edu.nchu.mall.services.flash_sale.web

flashsale:
  cache:
    timeout-seconds: 86400