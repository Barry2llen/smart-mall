server:
  port: 8080
spring:
  threads:
    virtual:
      enabled: true
  application:
    name: gateway
  config:
    import:
      - nacos:sentinel?group=commons
  cloud:
    sentinel:
      filter:
        enabled: false
      datasource:
        gatewayGwFlow:
          nacos:
            server-addr: ${spring.cloud.nacos.server-addr}
            namespace: ${spring.cloud.nacos.config.namespace}
            data-id: gateway-gw-flow-rules
            group-id: app
            data-type: json
            rule-type: gw-flow
        gatewayApiGroup:
          nacos:
            server-addr: ${spring.cloud.nacos.server-addr}
            namespace: ${spring.cloud.nacos.config.namespace}
            data-id: gateway-gw-api-group-rules
            group-id: app
            data-type: json
            rule-type: gw-api-group
    nacos:
      config:
        namespace: dev
        file-extension: yaml
        import-check:
          enabled: false
      server-addr: 127.0.0.1:8848
    gateway:
      routes:
        - id: ruoyi
          uri:
            lb://ruoyi
          predicates:
            - Path=/ruoyi/**
          filters:
            - RewritePath=/ruoyi/?(?<segment>.*), /$\{segment}
        - id: product
          uri:
            lb://product
          predicates:
            - Path=/product/**
          filters:
            - RewritePath=/product/?(?<segment>.*), /$\{segment}
        - id: file
          uri:
            lb://third-party
          predicates:
            - Path=/file/**
          filters:
            - RewritePath=/third-party/?(?<segment>.*), /$\{segment}
        - id: member
          uri:
            lb://member
          predicates:
            - Path=/member/**
          filters:
            - RewritePath=/member/?(?<segment>.*), /$\{segment}
        - id: ware
          uri:
            lb://ware
          predicates:
            - Path=/ware/**
          filters:
            - RewritePath=/ware/?(?<segment>.*), /$\{segment}
        - id: search
          uri:
            lb://search
          predicates:
            - Path=/search/**
          filters:
            - RewritePath=/search/?(?<segment>.*), /$\{segment}
        - id: auth
          uri:
            lb://auth
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/?(?<segment>.*), /$\{segment}
        - id: cart
          uri:
            lb://cart
          predicates:
            - Path=/cart/**
          filters:
            - RewritePath=/cart/?(?<segment>.*), /$\{segment}
        - id: order
          uri:
            lb://order
          predicates:
            - Path=/order/**
          filters:
            - RewritePath=/order/?(?<segment>.*), /$\{segment}
        - id: coupon
          uri:
            lb://coupon
          predicates:
            - Path=/coupon/**
          filters:
            - RewritePath=/coupon/?(?<segment>.*), /$\{segment}
        - id: flash-sale
          uri:
            lb://flash-sale
          predicates:
            - Path=/flash-sale/**
          filters:
            - RewritePath=/flash-sale/?(?<segment>.*), /$\{segment}
